<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stratify Goal Portal</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS (Hackathon setup for pixel-perfect Stitch UI match) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "on-primary-fixed-variant": "#004395",
              "error": "#ffb4ab",
              "surface-tint": "#adc6ff",
              "on-secondary": "#213145",
              "inverse-primary": "#005ac2",
              "tertiary-fixed": "#6ffbbe",
              "secondary-fixed-dim": "#b7c8e1",
              "tertiary": "#4edea3",
              "surface-container-low": "#161b2b",
              "outline-variant": "#424754",
              "surface-dim": "#0e1322",
              "surface-container-lowest": "#090e1c",
              "on-tertiary-fixed": "#002113",
              "surface": "#0e1322",
              "error-container": "#93000a",
              "on-error": "#690005",
              "inverse-surface": "#dee1f7",
              "on-primary": "#002e6a",
              "primary-fixed-dim": "#adc6ff",
              "tertiary-container": "#00a572",
              "on-tertiary-fixed-variant": "#005236",
              "outline": "#8c909f",
              "on-background": "#dee1f7",
              "surface-variant": "#2f3445",
              "primary-fixed": "#d8e2ff",
              "on-secondary-fixed": "#0b1c30",
              "surface-container-highest": "#2f3445",
              "surface-bright": "#343949",
              "secondary": "#b7c8e1",
              "surface-container": "#1a1f2f",
              "on-surface": "#dee1f7",
              "on-primary-container": "#00285d",
              "secondary-fixed": "#d3e4fe",
              "on-tertiary-container": "#00311f",
              "background": "#0e1322",
              "primary-container": "#4d8eff",
              "on-secondary-container": "#a9bad3",
              "on-surface-variant": "#c2c6d6",
              "on-error-container": "#ffdad6",
              "on-secondary-fixed-variant": "#38485d",
              "primary": "#adc6ff",
              "secondary-container": "#3a4a5f",
              "surface-container-high": "#25293a",
              "on-primary-fixed": "#001a42",
              "tertiary-fixed-dim": "#4edea3",
              "inverse-on-surface": "#2b3040",
              "on-tertiary": "#003824"
            },
            "borderRadius": {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            "spacing": {
              "unit": "4px",
              "sm": "8px",
              "md": "16px",
              "xs": "4px",
              "xl": "40px",
              "gutter": "24px",
              "margin": "32px",
              "lg": "24px"
            },
            "fontFamily": {
              "display-lg": ["Inter", "sans-serif"],
              "body-lg": ["Inter", "sans-serif"],
              "headline-lg": ["Inter", "sans-serif"],
              "headline-lg-mobile": ["Inter", "sans-serif"],
              "headline-md": ["Inter", "sans-serif"],
              "label-md": ["Inter", "sans-serif"],
              "code": ["JetBrains Mono", "monospace"],
              "body-md": ["Inter", "sans-serif"]
            },
            "fontSize": {
              "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
              "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}],
              "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
              "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
              "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
              "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
              "code": ["13px", {"lineHeight": "20px", "fontWeight": "400"}],
              "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-panel {
        background: rgba(22, 27, 44, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(1deg); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .animate-float-delayed {
        animation: float 8s ease-in-out infinite -2s;
      }
      /* Optional scroll animations to keep the feel from before */
      .fade-in-view {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }
      .fade-in-view.is-visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-container font-body-md overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
