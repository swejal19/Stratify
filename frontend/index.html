<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stratify Goal Portal</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "primary": "#006397",
              "secondary": "#005582",
              "success": "#10B981",
              "warning": "#F59E0B",
              "error": "#EF4444",
              "error-container": "#FEE2E2",
              "on-error-container": "#991B1B",
              "on-error": "#FFFFFF",
              "background": "#FFFFFF",
              "surface": "#FFFFFF",
              "surface-container": "#F1F5F9",
              "surface-container-lowest": "#FFFFFF",
              "surface-container-low": "#F1F5F9",
              "surface-container-high": "#E2E8F0",
              "surface-container-highest": "#E2E8F0",
              "surface-dim": "#F1F5F9",
              "surface-bright": "#FFFFFF",
              "surface-variant": "#F1F5F9",
              "on-background": "#374151",
              "on-surface": "#374151",
              "on-surface-variant": "#6B7280",
              "on-primary": "#FFFFFF",
              "on-secondary": "#FFFFFF",
              "outline": "#E5E7EB",
              "outline-variant": "#E5E7EB",
              "tertiary": "#10B981",
              "tertiary-container": "#ECFDF5",
              "on-tertiary-container": "#047857",
              "primary-container": "#E0F2FE",
              "on-primary-container": "#006397",
              "secondary-container": "#E0F2FE",
              "on-secondary-container": "#005582",
              "inverse-surface": "#111827",
              "inverse-on-surface": "#FFFFFF",
              "on-surface-muted": "#6B7280"
            },
            "borderRadius": {
              "DEFAULT": "24px",
              "sm": "8px",
              "md": "12px",
              "lg": "16px",
              "xl": "20px",
              "2xl": "24px",
              "3xl": "24px",
              "full": "9999px"
            },
            "spacing": {
              "unit": "4px",
              "sm": "8px",
              "md": "16px",
              "xs": "4px",
              "xl": "40px",
              "gutter": "24px",
              "margin": "32px",
              "lg": "24px"
            },
            "fontFamily": {
              "display-lg": ["Inter", "sans-serif"],
              "body-lg": ["Inter", "sans-serif"],
              "headline-lg": ["Inter", "sans-serif"],
              "headline-lg-mobile": ["Inter", "sans-serif"],
              "headline-md": ["Inter", "sans-serif"],
              "label-md": ["Inter", "sans-serif"],
              "code": ["JetBrains Mono", "monospace"],
              "body-md": ["Inter", "sans-serif"]
            },
            "fontSize": {
              "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
              "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}],
              "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
              "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
              "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
              "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
              "code": ["13px", {"lineHeight": "20px", "fontWeight": "400"}],
              "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(0, 0, 0, 0.06);
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-12px) rotate(0.5deg); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .animate-float-delayed {
        animation: float 8s ease-in-out infinite -2s;
      }
      h1, h2, h3, h4, h5, h6 {
        color: #111827;
      }
      body {
        color: #374151;
        background-color: #FFFFFF;
      }
    </style>
  </head>
  <body class="bg-background text-on-background selection:bg-primary/20 selection:text-primary font-body-md overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
